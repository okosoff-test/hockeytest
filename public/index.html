<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phan's Hockey</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text: #ffffff;
            --accent: #ff6b00;
            --input-bg: #3d3d3d;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* MAINTENANCE BULLETIN - FLASHING */
        .maintenance-bulletin {
            display: none;
            background: linear-gradient(90deg, #ff4444, #ff6b00, #ff4444);
            background-size: 200% 100%;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            text-align: center;
            font-weight: bold;
            font-size: 1.3rem;
            animation: flash 1s infinite;
            border: 3px solid #ff4444;
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.6);
            width: 100%;
            max-width: 900px;
        }

        .maintenance-bulletin.active {
            display: block;
        }

        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }

        h1 {
            text-align: center;
            color: var(--accent);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .game-info {
            background: linear-gradient(135deg, #2a2a2a, #333);
            border: 2px solid var(--accent);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
        }

        .game-date {
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .game-location {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 5px;
        }

        .game-time {
            font-size: 1.1rem;
            color: #ccc;
        }

        .spots-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .spot-counter {
            background: linear-gradient(135deg, #333, #444);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid var(--accent);
        }

        .spot-number {
            font-size: 3rem;
            font-weight: bold;
            color: var(--accent);
        }

        .spot-number.full {
            color: #ff4444;
        }

        .spot-text { 
            font-size: 0.9rem; 
            color: #ccc; 
            margin-top: 5px;
        }

        .full-badge {
            background: #ff4444;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin: 10px 0;
        }

        .waitlist-mode {
            background: linear-gradient(135deg, #3a1a1a, #4d2d2d);
            border: 2px solid #ff6b00;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
        }

        .waitlist-mode h3 {
            color: #ff6b00;
            margin: 0 0 10px 0;
        }

        .waitlist-mode p {
            color: #ccc;
            margin: 0;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: var(--input-bg);
            border: 1px solid #555;
            color: white;
            border-radius: 5px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover { background: #ff8533; }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .payment-options {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .payment-options > div {
            flex: 1;
            min-width: 120px;
        }

        .payment-options label {
            display: block;
            padding: 10px;
            background: var(--input-bg);
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            width: 100%;
            line-height: 1.4;
        }

        .payment-options input { 
            display: none; 
        }
        
        .payment-options input:checked + label {
            border-color: var(--accent);
            background: #4d4d4d;
        }

        .roster-notice {
            background: linear-gradient(135deg, #1a3a1a, #2d4d2d);
            border: 2px solid #4CAF50;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .roster-notice h3 {
            color: #4CAF50;
            margin: 0 0 10px 0;
        }

        .roster-notice p {
            color: #ccc;
            margin: 0;
        }

        .roster-link {
            display: inline-block;
            margin-top: 10px;
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
        }

        .roster-link:hover {
            text-decoration: underline;
        }

        .code-entry {
            background: linear-gradient(135deg, #2a1a3a, #3d2d4d);
            border: 2px solid var(--accent);
            border-radius: 10px;
            padding: 25px;
            margin: 20px 0;
            text-align: center;
        }

        .code-entry h3 {
            margin: 0 0 15px 0;
            color: var(--accent);
        }

        .code-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
        }

        .code-digit {
            width: 60px;
            height: 70px;
            font-size: 2rem;
            text-align: center;
            background: var(--input-bg);
            border: 2px solid #555;
            border-radius: 10px;
            color: white;
            margin: 0;
        }

        .code-digit:focus {
            border-color: var(--accent);
            outline: none;
        }

        .open-signup-notice {
            background: linear-gradient(135deg, #1a3a1a, #2d4d2d);
            border: 2px solid #4CAF50;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
            color: #4CAF50;
        }

        .view-waitlist-btn {
            background: #ff6b00;
            margin-top: 15px;
        }

        .view-roster-btn {
            background: #4CAF50;
            margin-top: 10px;
        }

        .rating-info {
            font-size: 0.85rem;
            color: #888;
            margin-top: -5px;
            margin-bottom: 10px;
        }

        /* Roster Display Section */
        .roster-display-section {
            background: linear-gradient(135deg, #1a2a1a, #2d3d2d);
            border: 3px solid #4CAF50;
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            display: none;
        }

        .roster-display-section.active {
            display: block;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .roster-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #4CAF50;
        }

        .roster-header h2 {
            color: #4CAF50;
            margin: 0 0 10px 0;
            font-size: 1.5rem;
        }

        .roster-header p {
            color: #aaa;
            margin: 0;
        }

        .teams-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .team-box {
            background: linear-gradient(135deg, #2a2a2a, #333);
            border-radius: 10px;
            padding: 20px;
            border: 2px solid;
        }

        .team-white {
            border-color: #ffffff;
        }

        .team-dark {
            border-color: #666666;
        }

        .team-header {
            text-align: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #444;
        }

        .team-name {
            font-size: 1.3rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .team-white .team-name {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .team-dark .team-name {
            color: #888888;
        }

        .team-rating {
            font-size: 0.9rem;
            color: #888;
            margin-top: 5px;
        }

        .player-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .player-item {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 10px;
            margin-bottom: 6px;
            background: rgba(0,0,0,0.2);
            border-radius: 5px;
            border-left: 3px solid transparent;
        }

        .player-item.goalie {
            border-left-color: #ff6b00;
            background: rgba(255, 107, 0, 0.1);
        }

        .player-name {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 0.9rem;
        }

        .goalie-badge {
            background: #ff6b00;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.65rem;
            font-weight: bold;
        }

        /* Lock schedule notice */
        .lock-notice {
            background: linear-gradient(135deg, #4a1a1a, #5d2d2d);
            border: 3px solid #ff4444;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
            color: #ffaaaa;
            font-size: 1rem;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 68, 68, 0.3); }
            50% { box-shadow: 0 0 30px rgba(255, 68, 68, 0.5); }
        }

        .lock-notice strong {
            display: block;
            margin-bottom: 10px;
            font-size: 1.3rem;
            color: #ff4444;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .lock-notice .open-time {
            color: #4CAF50;
            font-weight: bold;
            display: block;
            margin-top: 12px;
            font-size: 1.1rem;
            background: rgba(76, 175, 80, 0.1);
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #4CAF50;
        }

        .lock-notice .no-code-note {
            color: #888;
            font-size: 0.9rem;
            display: block;
            margin-top: 8px;
        }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            .spot-number { font-size: 2.5rem; }
            .code-digit { width: 50px; height: 60px; font-size: 1.5rem; }
            .spots-container { grid-template-columns: 1fr; }
            .teams-container { grid-template-columns: 1fr; }
            .payment-options > div {
                flex: 1 1 100%;
            }
            .lock-notice { font-size: 0.9rem; padding: 15px; }
            .lock-notice strong { font-size: 1.1rem; }
        }
    
        /* Registered Players Section */
        .registered-players-section {
            background: linear-gradient(135deg, #1a2a1a, #2d3d2d);
            border: 2px solid #4CAF50;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .player-card {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 3px solid var(--accent);
            position: relative;
            min-width: 0;
        }

        .player-card.goalie-card {
            border-left-color: #ff6b00;
            background: rgba(255, 107, 0, 0.1);
        }

        .player-card.protected-card {
            border-left-color: #4CAF50;
            background: rgba(76, 175, 80, 0.1);
        }

        .player-avatar {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            flex-shrink: 0;
        }

        .player-card.goalie-card .player-avatar {
            background: #ff6b00;
        }

        .player-card.protected-card .player-avatar {
            background: #4CAF50;
        }

        .player-info-simple {
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }

        .player-name-simple {
            font-weight: 500;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .goalie-label {
            color: #ff6b00;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .protected-label {
            color: #4CAF50;
            font-size: 0.7rem;
            font-weight: bold;
        }

        /* COMPACT CANCEL BUTTON */
        .cancel-btn {
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
            white-space: nowrap;
            line-height: 1;
            min-width: auto;
            width: auto;
            margin: 0;
        }

        .cancel-btn:hover {
            background: #ff6666;
        }

        /* Cancel Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border: 2px solid #ff4444;
            border-radius: 15px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .modal-content h3 {
            color: #ff4444;
            margin: 0 0 15px 0;
        }

        .modal-content p {
            color: #ccc;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
            margin: 0;
            padding: 12px;
            font-size: 1rem;
        }

        .modal-buttons .confirm-cancel {
            background: #ff4444;
        }

        .modal-buttons .confirm-cancel:hover {
            background: #ff6666;
        }

        .modal-buttons .abort-btn {
            background: #555;
        }

        .modal-buttons .abort-btn:hover {
            background: #666;
        }

        .cancel-error {
            color: #ff4444;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }

        .cancel-success {
            color: #4CAF50;
            font-size: 0.9rem;
            margin-top: 15px;
            padding: 10px;
            background: rgba(76, 175, 80, 0.1);
            border-radius: 5px;
            display: none;
        }

        @media (max-width: 600px) {
            .players-grid {
                grid-template-columns: 1fr;
            }
            .player-card {
                padding: 8px 10px;
            }
            .player-avatar {
                width: 32px;
                height: 32px;
                font-size: 0.9rem;
            }
            .player-name-simple {
                font-size: 0.85rem;
            }
            .cancel-btn {
                padding: 3px 6px;
                font-size: 0.65rem;
            }
        }

</style>
<base target="_blank">
</head>
<body>

    <!-- MAINTENANCE BULLETIN -->
    <div class="maintenance-bulletin" id="maintenanceBulletin">
        Portal is down for maintenance, check back later
    </div>

    <div class="container" id="playerView">
        <h1 id="pageTitle">Phan's Hockey</h1>
        
        <div class="game-info">
            <div class="game-date" id="gameDate">Loading...</div>
            <div class="game-location" id="gameLocation">Loading...</div>
            <div class="game-time" id="gameTime">Loading...</div>
        </div>
