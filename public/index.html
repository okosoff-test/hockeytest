<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phan Hockey</title>
<style>
:root {
    --accent:#ff6b00;
    --bg:#1a1a1a;
    --card:#2d2d2d;
    --text:#fff;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Segoe UI, sans-serif;
    display:flex;
    justify-content:center;
    padding:20px;
}

.hero{
    background:linear-gradient(135deg,#2a2a2a,#333);
    border:2px solid var(--accent);
    border-radius:14px;
    padding:18px;
    text-align:center;
    width:100%;
    max-width:420px;
}

.game-day{
    font-size:0.9rem;
    letter-spacing:2px;
    color:#bbb;
}

.game-time{
    font-size:2.2rem;
    font-weight:900;
}

.game-location{
    color:var(--accent);
    margin-top:4px;
}

.game-date{
    font-size:0.85rem;
    color:#aaa;
}

button{
    margin-top:14px;
    padding:12px 20px;
    background:var(--accent);
    border:none;
    border-radius:30px;
    color:white;
    font-weight:bold;
}

.spots{
    margin-top:14px;
    font-size:2rem;
    font-weight:bold;
}

.spots-label{
    font-size:0.9rem;
    color:#ccc;
}
</style>
</head>
<body>

<div class="hero">
    <div class="game-day">FRIDAY</div>
    <div class="game-time">9:30 PM</div>
    <div class="game-location">Vollmer Arena</div>
    <div class="game-date">Apr 17</div>

    <button>🏒 Join Game</button>

    <div class="spots">8</div>
    <div class="spots-label">Open Spots</div>
</div>

</body>
</html>
