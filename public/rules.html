<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Rules - Phan's Hockey</title>

<style>
:root {
    --bg-color: #1a1a1a;
    --card-bg: #2d2d2d;
    --text: #ffffff;
    --accent: #ff6b00;
}

body {
    background-color: var(--bg-color);
    color: var(--text);
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
}

/* ✅ COMPACT CHECKBOX FIX */
.checkbox-container {
    display: flex;
    align-items: center;
    gap: 10px;
}

.checkbox-container input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    appearance: none;
    background: white;
    border: 2px solid #4CAF50;
    border-radius: 4px;
    position: relative;
}

.checkbox-container input[type="checkbox"]:checked {
    background: #4CAF50;
}

.checkbox-container input[type="checkbox"]:checked::after {
    content: '✓';
    color: white;
    font-size: 14px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.checkbox-container label {
    font-size: 0.95rem;
}

/* 📱 MOBILE OPTIMIZATION */
@media (max-width: 600px) {
    .checkbox-container input[type="checkbox"] {
        width: 16px;
        height: 16px;
    }

    .checkbox-container label {
        font-size: 0.9rem;
    }
}
</style>
</head>

<body>

<h1>Phan's Hockey Rules</h1>

<div class="checkbox-container">
    <input type="checkbox" id="agree">
    <label for="agree">I agree to all rules</label>
</div>

</body>
</html>
