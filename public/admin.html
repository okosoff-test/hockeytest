<!DOCTYPE html>
<html>
<head>
<title>Admin - Clean UI</title>
</head>
<body>

<div class="game-setup-section">
    <h3>🏒 Game Setup</h3>

    <div class="title-preview">
        Phan's Friday Hockey
    </div>

    <div class="game-setup-grid">
        <div>
            <label>Day and time</label>
            <input type="date">
            <button>9:30 PM</button>
        </div>

        <div>
            <label>Arena</label>
            <select>
                <option>Vollmer Lasalle Arena</option>
                <option>Atlas Tube Centre</option>
            </select>
        </div>
    </div>

    <div class="game-setup-preview-line">
        <strong>Friday 9:30 PM • Vollmer Lasalle Arena</strong>
    </div>

    <button>Save Game Setup</button>
</div>

</body>
</html>
