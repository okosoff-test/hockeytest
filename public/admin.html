
<!-- UPDATED TITLE INPUT -->
<textarea id="titleInput" rows="1" placeholder="Enter custom title..."></textarea>

<style>
#titleInput {
    width: 100%;
    max-width: 800px;
    min-height: 50px;

    padding: 14px 16px;
    font-size: 1.3rem;
    font-weight: bold;

    border-radius: 12px;
    border: 2px solid #555;
    background: #3d3d3d;
    color: white;

    resize: none;
    overflow: hidden;
    line-height: 1.3;
}
</style>

<script>
const titleInput = document.getElementById('titleInput');

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
}

titleInput.addEventListener('input', function () {
    autoResize(this);
});

autoResize(titleInput);
</script>
