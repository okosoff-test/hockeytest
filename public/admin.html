<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Players</title>

<style>
body {
    background:#1a1a1a;
    color:#fff;
    font-family: Arial, sans-serif;
    padding:20px;
}

/* Row container */
.player-row {
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#2b2b2b;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}

/* Name + rating */
.player-left {
    display:flex;
    flex-direction:column;
}

.player-name {
    font-weight:600;
    font-size:1rem;
}

.player-rating {
    font-size:0.85rem;
    color:#bbb;
}

/* PAYMENT BLOCK (YOUR FINAL VERSION) */
.payment-block {
    display:flex;
    flex-direction:column;
    gap:4px;
    align-items:flex-start;
}

.payment-method {
    font-size:0.78rem;
    color:#bbb;
    background:rgba(255,255,255,0.06);
    padding:4px 10px;
    border-radius:999px;
    line-height:1;
}

.payment-row {
    display:flex;
    gap:6px;
    align-items:center;
}

.tap-amount {
    width:52px;
    height:38px;
    background:#555;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:600;
}

.paid-amount {
    width:52px;
    height:38px;
    background:#3a3a3a;
    border:1px solid #555;
    border-radius:8px;
    text-align:center;
    color:#fff;
}

/* Remove button */
.remove-btn {
    background:#ff4b4b;
    border:none;
    color:#fff;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>Admin Players</h2>

<div class="player-row">
    <div class="player-left">
        <div class="player-name">Jug Head</div>
        <div class="player-rating">Rating: 5.8</div>
    </div>

    <div class="payment-block">
        <div class="payment-method">E-Transfer</div>
        <div class="payment-row">
            <div class="tap-amount">$15</div>
            <input class="paid-amount" value="15">
        </div>
    </div>

    <button class="remove-btn">Remove</button>
</div>

</body>
</html>
