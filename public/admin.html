<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="admin-header">
  <h1 class="admin-title">ADMIN DASHBOARD</h1>

  <!-- MAINTENANCE (RED PILL STYLE) -->
  <div class="maintenance-pill">
    <span>Maintenance</span>
    <button class="pill-toggle">ACTIVE</button>
  </div>

  <div class="admin-actions">
    <button class="btn-green">Download Backup</button>
    <button class="btn-blue">Preview Latest</button>
    <button class="btn-blue">Restore Latest</button>
    <button class="btn-purple">Restore Backup</button>
    <button class="btn-brown">Logout All Devices</button>
    <button class="btn-gray">Logout</button>
  </div>
</div>

</body>
</html>
