<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
    background: #1a1a1a;
    color: white;
    font-family: Segoe UI, sans-serif;
    margin: 0;
    padding: 20px;
}

/* SECTION WRAPPER */
.section {
    margin-bottom: 20px;
}

/* MAINTENANCE PILL */
.maintenance-pill {
    display: inline-block;
    padding: 14px 24px;
    border-radius: 40px;
    font-weight: bold;
    cursor: pointer;
    background: #2ecc71;
    transition: 0.2s;
}

/* ACTIVE STATE */
.maintenance-pill.active {
    background: #e74c3c;
}

/* BUTTON ROW */
.button-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.btn {
    padding: 10px 16px;
    border-radius: 8px;
    background: #3498db;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Admin Panel</h1>

<!-- MAINTENANCE -->
<div class="section">
    <div id="maintenanceBtn" class="maintenance-pill">
        Maintenance Mode OFF
    </div>
</div>

<!-- OTHER ACTIONS -->
<div class="section button-row">
    <div class="btn">Roster Release</div>
    <div class="btn">Sync Data</div>
    <div class="btn">Reset Stats</div>
</div>

<script>
let maintenance = false;

const btn = document.getElementById("maintenanceBtn");

btn.addEventListener("click", () => {
    maintenance = !maintenance;

    if (maintenance) {
        btn.classList.add("active");
        btn.innerText = "Maintenance Mode ON";
    } else {
        btn.classList.remove("active");
        btn.innerText = "Maintenance Mode OFF";
    }

    // 🔥 OPTIONAL: Hook to backend later
    console.log("Maintenance:", maintenance);
});
</script>

</body>
</html>
