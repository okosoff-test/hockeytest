<!DOCTYPE html>
<html>
<body style="background:#1a1a1a;color:white;font-family:sans-serif;padding:20px;">
<h2>Add Player Manually</h2>

<label><input type="checkbox" id="goalieCheckbox" onchange="toggleGoalieMode()"> Goalie (Free)</label><br><br>

<div id="goalieQuickSelectContainer" style="display:none;">
    <label>Quick Goalie Select</label><br>
    <select id="goalieSelect" onchange="fillGoalie()">
        <option value="">-- Select Goalie --</option>
        <option data-first="Craig" data-last="Scolack" data-rating="9">Craig Scolack</option>
        <option data-first="Hao" data-last="Chau" data-rating="8">Hao Chau</option>
        <option data-first="Mat" data-last="Carriere" data-rating="7">Mat Carriere</option>
        <option data-first="Jesse" data-last="Laframboise" data-rating="8">Jesse Laframboise</option>
        <option data-first="Kent" data-last="Nelson" data-rating="7">Kent Nelson</option>
    </select>
</div><br>

<input id="first" placeholder="First Name"><br><br>
<input id="last" placeholder="Last Name"><br><br>
<input id="rating" placeholder="Rating"><br><br>

<select id="paymentSelect">
    <option>Cash</option>
    <option>E-Transfer</option>
</select>

<script>
function toggleGoalieMode(){
    const isGoalie = document.getElementById("goalieCheckbox").checked;
    document.getElementById("goalieQuickSelectContainer").style.display = isGoalie ? "block" : "none";
    document.getElementById("paymentSelect").style.display = isGoalie ? "none" : "block";
}

function fillGoalie(){
    const sel = document.getElementById("goalieSelect");
    const opt = sel.options[sel.selectedIndex];
    if(!opt.dataset.first) return;
    document.getElementById("first").value = opt.dataset.first;
    document.getElementById("last").value = opt.dataset.last;
    document.getElementById("rating").value = opt.dataset.rating;
    document.getElementById("goalieCheckbox").checked = true;
    toggleGoalieMode();
}
</script>
</body>
</html>
