<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waitlist Fix</title>
<style>
body { background:#1a1a1a; color:#fff; font-family:Arial; padding:20px; }

/* FIX START */
.waitlist-title-row {
    display: flex;
    align-items: center;
    gap: 10px;
}

.waitlist-title {
    margin: 0;
}

.waitlist-badge {
    background: rgba(255,255,255,0.1);
    border: 1px solid #555;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 0.8rem;
    white-space: nowrap;
}
/* FIX END */
</style>
</head>
<body>

<div class="waitlist-title-row">
    <h3 class="waitlist-title">CURRENT WAITLIST</h3>
    <span class="waitlist-badge">1 player(s)</span>
</div>

</body>
</html>
